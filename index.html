<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Management System</title>

<style>

body{

    font-family: Arial, sans-serif;

    background:#f4f4f4;

    margin:0;

}

.container{

    width:90%;

    max-width:900px;

    margin:30px auto;

    background:white;

    padding:20px;

    border-radius:10px;

    box-shadow:0 0 10px rgba(0,0,0,0.2);

}

h1{

    text-align:center;

    color:#333;

}

input{

    width:30%;

    padding:10px;

    margin:5px;

    border:1px solid #ccc;

    border-radius:5px;

}

button{

    padding:10px 15px;

    background:green;

    color:white;

    border:none;

    border-radius:5px;

    cursor:pointer;

}

button:hover{

    opacity:0.9;

}

table{

    width:100%;

    margin-top:20px;

    border-collapse:collapse;

}

table, th, td{

    border:1px solid #ddd;

}

th{

    background:#333;

    color:white;

    padding:10px;

}

td{

    padding:10px;

    text-align:center;

}

.pass{

    color:green;

    font-weight:bold;

}

.fail{

    color:red;

    font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

    <h1>Student Management System</h1>

    <input type="text" id="name" placeholder="Student Name">

    <input type="text" id="roll" placeholder="Roll Number">

    <input type="number" id="marks" placeholder="Marks">

    <button onclick="addStudent()">Add Student</button>

    <table>

        <thead>

            <tr>

                <th>Name</th>

                <th>Roll No</th>

                <th>Marks</th>

                <th>Status</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody id="studentTable"></tbody>

    </table>

</div>

<script>

function addStudent() {

    let name = document.getElementById("name").value;

    let roll = document.getElementById("roll").value;

    let marks = document.getElementById("marks").value;

    if(name === "" || roll === "" || marks === ""){

        alert("Please fill all fields");

        return;

    }

    let status = marks >= 35 ? "Pass" : "Fail";

    let statusClass = marks >= 35 ? "pass" : "fail";

    let row = `

    <tr>

        <td>${name}</td>

        <td>${roll}</td>

        <td>${marks}</td>

        <td class="${statusClass}">${status}</td>

        <td>

            <button onclick="deleteRow(this)">Delete</button>

        </td>

    </tr>`;

    document.getElementById("studentTable").innerHTML += row;

    document.getElementById("name").value = "";

    document.getElementById("roll").value = "";

    document.getElementById("marks").value = "";

}

function deleteRow(btn){

    btn.parentElement.parentElement.remove();

}

</script>

</body>

</html>
